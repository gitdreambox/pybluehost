name: Tests

on:
  push:
    branches: [master, "claude/*"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -m "not hardware"

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short -m "not hardware"

      - name: Run btsnoop tests
        run: uv run pytest tests/btsnoop/ -v --tb=short

      - name: Run full test suite with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            -m "not hardware" \
            --cov=pybluehost \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: python${{ matrix.python-version }}
          fail_ci_if_error: false
